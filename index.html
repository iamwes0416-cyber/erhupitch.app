<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WH二胡音準養成工具</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { overscroll-behavior-y: none; }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-slate-50">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- 圖示庫 (SVG) ---
    const ClockIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-indigo-500"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
    const PhoneIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-indigo-500"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>;
    const MapPinIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-indigo-500 flex-shrink-0"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>;
    const LineIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>;
    const FbIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>;
    const YoutubeIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2.5 17a24.12 24.12 0 0 1 0-10 2 2 0 0 1 1.4-1.4 49.56 49.56 0 0 1 16.2 0A2 2 0 0 1 21.5 7a24.12 24.12 0 0 1 0 10 2 2 0 0 1-1.4 1.4 49.55 49.55 0 0 1-16.2 0A2 2 0 0 1 2.5 17"/><path d="m10 15 5-3-5-3z"/></svg>;
    const MusicIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>;

    // --- 音樂理論常數 ---
    const NOTES = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
    const MAJOR_SCALE_INTERVALS = [0, 2, 4, 5, 7, 9, 11];
    const JIANPU_MAP = { 0: '1', 2: '2', 4: '3', 5: '4', 7: '5', 9: '6', 11: '7' };

    const KEY_OPTIONS = [
      { label: 'D', note: 'D', desc: '1 - 5 弦' },
      { label: 'G', note: 'G', desc: '5̣ - 2 弦' },
      { label: 'F', note: 'F', desc: '6̣ - 3 弦' },
      { label: 'B♭', note: 'A#', desc: '3 - 7̣ 弦' },
      { label: 'A', note: 'A', desc: '4̣ - 1 弦' },
      { label: 'C', note: 'C', desc: '2 - 6 弦' },
    ];

    const getFrequency = (note, octave) => {
      const noteIndex = NOTES.indexOf(note);
      let semitonesFromC4 = (octave - 4) * 12 + noteIndex;
      let semitonesFromA4 = semitonesFromC4 - 9;
      return 442 * Math.pow(2, semitonesFromA4 / 12);
    };

    const getScaleNotes = (root) => {
      const rootIndex = NOTES.indexOf(root);
      return MAJOR_SCALE_INTERVALS.map(interval => NOTES[(rootIndex + interval) % 12]);
    };

    const ERHU_STRINGS = [
      { name: '內弦', baseNote: 'D', baseOctave: 4, type: 'inner' },
      { name: '外弦', baseNote: 'A', baseOctave: 4, type: 'outer' }
    ];

    // 獨立出來的單一音符按鈕 (避免重新渲染時被瀏覽器中斷事件)
    const NoteButton = ({ note, octave, isActive, getJianpuInfo, startTone, stopTone }) => {
      const jianpuInfo = getJianpuInfo(note, octave);
      const fmtNote = (n) => n.endsWith('#') ? '#' + n.slice(0, -1) : n;
      
      return (
        <button
          onMouseDown={() => startTone(note, octave)} 
          onMouseUp={stopTone} 
          onMouseLeave={stopTone}
          onTouchStart={(e) => { e.preventDefault(); startTone(note, octave); }}
          onTouchEnd={(e) => { e.preventDefault(); stopTone(); }}
          onTouchCancel={(e) => { e.preventDefault(); stopTone(); }}
          onContextMenu={(e) => e.preventDefault()}
          className={`w-24 h-24 rounded-full flex flex-col items-center justify-center shadow-md transition-all border-2 touch-none z-20 relative bg-white ${isActive ? 'bg-amber-400 border-amber-500 text-stone-900 scale-110 ring-4 ring-amber-200' : 'bg-white border-stone-200 text-stone-800 hover:border-indigo-400 hover:shadow-lg'}`}
          style={{ WebkitTapHighlightColor: 'transparent' }}
        >
          <div className="relative flex flex-col items-center justify-center h-12 w-full mb-1 pointer-events-none">
            {(jianpuInfo.dot === 1 || jianpuInfo.dot === 2) && (
              <div className="absolute -top-1.5 flex gap-[3px]">
                <div className="w-3 h-3 rounded-full bg-current"></div>
                {jianpuInfo.dot === 2 && <div className="w-3 h-3 rounded-full bg-current"></div>}
              </div>
            )}
            <span className="font-bold text-4xl leading-none font-serif">{jianpuInfo.number}</span>
            {(jianpuInfo.dot === -1 || jianpuInfo.dot === -2) && (
              <div className="absolute -bottom-2 flex gap-[3px]">
                <div className="w-3 h-3 rounded-full bg-current"></div>
                {jianpuInfo.dot === -2 && <div className="w-3 h-3 rounded-full bg-current"></div>}
              </div>
            )}
          </div>
          <span className={`text-xl font-mono font-bold leading-none pointer-events-none mt-2 ${isActive ? 'text-stone-900' : 'text-stone-600'}`}>
            {fmtNote(note)}{octave}
          </span>
        </button>
      );
    };

    // 獨立出來的整個二胡指板 (保持結構穩定)
    const ErhuBoard = ({ activeNote, isNoteInScale, getJianpuInfo, startTone, stopTone }) => {
      const frets = Array.from({ length: 13 }, (_, i) => i);
      let currentTop = 0;
      
      const rowLayouts = frets.map(semitone => {
        const innerBase = NOTES.indexOf(ERHU_STRINGS[0].baseNote);
        const outerBase = NOTES.indexOf(ERHU_STRINGS[1].baseNote);
        
        const innerNote = NOTES[(innerBase + semitone) % 12];
        const outerNote = NOTES[(outerBase + semitone) % 12];
        
        const innerOctave = ERHU_STRINGS[0].baseOctave + Math.floor((innerBase + semitone) / 12);
        const outerOctave = ERHU_STRINGS[1].baseOctave + Math.floor((outerBase + semitone) / 12);

        let isInnerIn = isNoteInScale(innerNote);
        let isOuterIn = isNoteInScale(outerNote);

        const height = (isInnerIn || isOuterIn) ? 100 : 56; 
        
        const layout = {
          semitone,
          height,
          top: currentTop,
          center: currentTop + height / 2,
          hasInner: isInnerIn,
          hasOuter: isOuterIn
        };
        
        currentTop += height;
        return layout;
      });

      const renderVerticalConnections = (stringType) => {
        const lines = [];
        const isInner = stringType === 'inner';
        const HEADER_OFFSET = 64; 
        const LINE_X_POS = isInner ? '8.5rem' : '18.5rem';
        
        const validSemitones = rowLayouts
          .filter(r => isInner ? r.hasInner : r.hasOuter)
          .map(r => r.semitone);

        for (let i = 0; i < validSemitones.length - 1; i++) {
          const curr = validSemitones[i];
          const next = validSemitones[i + 1];
          const distance = next - curr;

          if (distance === 2) {
            const startRow = rowLayouts.find(r => r.semitone === curr);
            const endRow = rowLayouts.find(r => r.semitone === next);
            
            if (startRow && endRow) {
              lines.push(
                <div 
                  key={`vline-${stringType}-${curr}-${next}`}
                  className="absolute border-l-2 border-stone-400 z-0 opacity-50"
                  style={{
                    borderLeftStyle: 'dashed',
                    left: LINE_X_POS,
                    top: `${startRow.center + HEADER_OFFSET}px`,
                    height: `${endRow.center - startRow.center}px`,
                    transform: 'translateX(-50%)'
                  }}
                />
              );
            }
          }
        }
        return lines;
      };

      return (
        <div className="relative flex flex-col items-center py-4 overflow-y-auto select-none min-h-[400px]">
          <div className="absolute top-0 bottom-0 pointer-events-none z-0" style={{ width: '27rem' }}>
             <div className="absolute top-0 bottom-0 left-[8.5rem] w-1.5 bg-stone-300 -translate-x-1/2" />
             <div className="absolute top-0 bottom-0 left-[18.5rem] w-1.5 bg-stone-300 -translate-x-1/2" />
             <div className="absolute top-[136px] w-full border-t-2 border-stone-300 flex justify-center">
                <span className="absolute -top-3 bg-slate-50 px-2 text-xs text-stone-500 font-bold tracking-wider">空弦 / 千金</span>
             </div>
          </div>

          <div className="relative z-10" style={{ width: '27rem' }}>
             {renderVerticalConnections('inner')}
             {renderVerticalConnections('outer')}

             <div className="h-8 w-full relative mb-8">
                <div className="absolute left-[8.5rem] -translate-x-1/2 bg-stone-700 text-stone-200 text-sm font-bold px-3 py-1 rounded shadow-md">
                  內弦 ({ERHU_STRINGS[0].baseNote}{ERHU_STRINGS[0].baseOctave})
                </div>
                <div className="absolute left-[18.5rem] -translate-x-1/2 bg-stone-700 text-stone-200 text-sm font-bold px-3 py-1 rounded shadow-md">
                  外弦 ({ERHU_STRINGS[1].baseNote}{ERHU_STRINGS[1].baseOctave})
                </div>
             </div>

             {rowLayouts.map(layout => {
               const { semitone, height } = layout;
               const innerBase = NOTES.indexOf(ERHU_STRINGS[0].baseNote);
               const outerBase = NOTES.indexOf(ERHU_STRINGS[1].baseNote);
               const innerNote = NOTES[(innerBase + semitone) % 12];
               const outerNote = NOTES[(outerBase + semitone) % 12];
               const innerOctave = ERHU_STRINGS[0].baseOctave + Math.floor((innerBase + semitone) / 12);
               const outerOctave = ERHU_STRINGS[1].baseOctave + Math.floor((outerBase + semitone) / 12);
               
               let isInnerIn = isNoteInScale(innerNote);
               let isOuterIn = isNoteInScale(outerNote);
               const rowStyle = { height: `${height}px` };

               return (
                 <div key={semitone} className="relative w-full flex items-center" style={rowStyle}>
                   {semitone === 5 && (
                      <div className="absolute top-0 left-[6rem] w-[15rem] border-t border-dotted border-stone-300 opacity-50 z-0" />
                   )}
                   <div className="absolute left-[8.5rem] -translate-x-1/2 flex items-center justify-center w-24 z-20"> 
                      {isInnerIn && (
                        <NoteButton 
                          note={innerNote} octave={innerOctave} isActive={activeNote === `${innerNote}${innerOctave}`}
                          getJianpuInfo={getJianpuInfo} startTone={startTone} stopTone={stopTone}
                        />
                      )}
                   </div>
                   <div className="absolute left-[18.5rem] -translate-x-1/2 flex items-center justify-center w-24 z-20">
                      {isOuterIn && (
                        <NoteButton 
                          note={outerNote} octave={outerOctave} isActive={activeNote === `${outerNote}${outerOctave}`}
                          getJianpuInfo={getJianpuInfo} startTone={startTone} stopTone={stopTone}
                        />
                      )}
                   </div>
                 </div>
               );
             })}
          </div>
        </div>
      );
    };

    function MusicTool() {
      const [rootNote, setRootNote] = useState('D');
      const [displayKeyLabel, setDisplayKeyLabel] = useState('D'); 
      const [activeNote, setActiveNote] = useState(null);

      const audioCtxRef = useRef(null);
      const activeSoundRef = useRef(null); 

      const scaleNotes = getScaleNotes(rootNote);
      const isNoteInScale = (note) => scaleNotes.includes(note);

      const getJianpuInfo = (note, noteOctave) => {
        const rootIdx = NOTES.indexOf(rootNote);
        const noteIdx = NOTES.indexOf(note);
        
        const interval = (noteIdx - rootIdx + 12) % 12;
        const number = JIANPU_MAP[interval];
        
        if (!number) return null;

        const rootBaseAbs = 4 * 12 + rootIdx; 
        const noteAbs = noteOctave * 12 + noteIdx;
        
        const diff = noteAbs - rootBaseAbs;
        
        let dot = 0;
        if (diff >= 12 && diff < 24) dot = 1;
        else if (diff >= 24) dot = 2;
        else if (diff < 0 && diff >= -12) dot = -1;
        else if (diff < -12) dot = -2;

        return { number, dot };
      };

      const initAudio = () => {
        if (!audioCtxRef.current) {
          audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtxRef.current.state === 'suspended') {
          audioCtxRef.current.resume();
        }
        return audioCtxRef.current;
      };

      const startTone = (note, octave) => {
        const ctx = initAudio();
        const frequency = getFrequency(note, octave);

        if (activeSoundRef.current) stopTone();

        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        let filter = null;
        let lfo = null;
        let lfoGain = null;

        osc.type = 'sawtooth'; 
        filter = ctx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(1800, ctx.currentTime); 
        filter.Q.value = 1;

        lfo = ctx.createOscillator();
        lfoGain = ctx.createGain();
        lfo.type = 'sine';
        lfo.frequency.setValueAtTime(5.5, ctx.currentTime); 
        lfoGain.gain.setValueAtTime(frequency * 0.01, ctx.currentTime); 

        lfo.connect(lfoGain);
        lfoGain.connect(osc.frequency);
        lfo.start();

        gain.gain.setValueAtTime(0, ctx.currentTime);
        gain.gain.linearRampToValueAtTime(0.3, ctx.currentTime + 0.1); 

        osc.connect(filter);
        filter.connect(gain);
        gain.connect(ctx.destination);

        osc.frequency.setValueAtTime(frequency, ctx.currentTime);
        osc.start();

        activeSoundRef.current = { osc, gain, lfo, filter };
        setActiveNote(`${note}${octave}`);
      };

      const stopTone = () => {
        if (activeSoundRef.current) {
          const ctx = audioCtxRef.current;
          const { osc, gain, lfo } = activeSoundRef.current;
          try {
            gain.gain.cancelScheduledValues(ctx.currentTime);
            gain.gain.setValueAtTime(gain.gain.value, ctx.currentTime);
            gain.gain.linearRampToValueAtTime(0.0001, ctx.currentTime + 0.05);
            osc.stop(ctx.currentTime + 0.05);
            if (lfo) lfo.stop(ctx.currentTime + 0.05);
          } catch (e) {
            console.error("Audio stop error:", e);
          }
          activeSoundRef.current = null;
          setActiveNote(null);
        }
      };

      return (
        <div className="min-h-screen bg-slate-50 text-slate-800 font-sans pb-10">
          <div className="max-w-4xl mx-auto p-3 md:p-4">
            
            <div className="bg-white border border-slate-200 rounded-2xl p-4 md:p-6 shadow-sm mb-4 md:mb-6">
              <div className="flex flex-col md:flex-row items-center justify-between gap-6 text-center md:text-left">
                <div className="flex flex-row items-center gap-4 text-left"> 
                  <div className="relative w-20 h-20 rounded-lg overflow-hidden shadow-sm flex-shrink-0 bg-white">
                     <img src="whats二胡logo-方.png" alt="WH Logo" className="w-full h-full object-contain" />
                  </div>
                  <div>
                    <h3 className="text-xl font-bold text-slate-800 whitespace-nowrap">WH 二胡｜您的二胡專家</h3>
                    <p className="text-sm text-indigo-600 font-bold mt-1">樂器販售 • 專業教學</p>
                  </div>
                </div>

                <div className="flex flex-col gap-2 text-sm text-slate-600 items-center md:items-start">
                   <div className="flex items-center gap-2">
                     <ClockIcon /><span>10:00–19:00（預約制）</span>
                   </div>
                   <div className="flex items-center gap-2">
                     <PhoneIcon /><span>(02) 2881-3239</span>
                   </div>
                   <div className="flex items-center gap-2 text-center md:text-left">
                     <MapPinIcon /><span>台北市士林區承德路四段 235 號 2 樓</span>
                   </div>
                </div>

                <div className="flex w-full md:w-auto gap-2 md:gap-3">
                   <a href="https://lin.ee/YDerWnQ" target="_blank" rel="noreferrer" className="flex-1 md:flex-none bg-[#06C755] hover:bg-[#05b64d] text-white px-3 md:px-6 py-3 rounded-full font-bold flex items-center justify-center gap-1 md:gap-2 transition-colors shadow-sm text-sm md:text-base">
                     <LineIcon /> <span className="hidden sm:inline">LINE</span>
                   </a>
                   <a href="https://www.facebook.com/qwtwherhu/" target="_blank" rel="noreferrer" className="flex-1 md:flex-none bg-[#1877F2] hover:bg-[#166fe5] text-white px-3 md:px-6 py-3 rounded-full font-bold flex items-center justify-center gap-1 md:gap-2 transition-colors shadow-sm text-sm md:text-base">
                     <FbIcon /> <span className="hidden sm:inline">FB</span>
                   </a>
                   <a href="https://www.youtube.com/@wherhu" target="_blank" rel="noreferrer" className="flex-1 md:flex-none bg-[#FF0000] hover:bg-[#CC0000] text-white px-3 md:px-6 py-3 rounded-full font-bold flex items-center justify-center gap-1 md:gap-2 transition-colors shadow-sm text-sm md:text-base">
                     <YoutubeIcon /> <span className="hidden sm:inline">YT</span>
                   </a>
                </div>
              </div>
            </div>

            <div className="flex items-center justify-between mb-4 md:mb-6 bg-white p-4 rounded-xl shadow-sm border border-slate-100">
              <div className="flex items-center gap-3">
                <div className="text-indigo-600">
                  <MusicIcon />
                </div>
                <div>
                  <h1 className="text-lg md:text-xl font-bold text-slate-800">二胡音準養成工具</h1>
                </div>
              </div>
            </div>

            <div className="mb-6 md:mb-8">
               <div className="bg-white p-4 md:p-6 rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                 <label className="block text-sm font-bold text-slate-400 uppercase tracking-wider mb-4">選擇調性 (Key)</label>
                 <div className="flex gap-4 overflow-x-auto pb-4 scrollbar-hide snap-x">
                   {KEY_OPTIONS.map((k) => (
                     <button
                       key={k.label} onClick={() => { setRootNote(k.note); setDisplayKeyLabel(k.label); }}
                       className={`px-6 py-4 rounded-lg font-bold transition-all flex flex-col items-center justify-center min-w-[5rem] flex-shrink-0 snap-start ${rootNote === k.note ? 'bg-amber-400 text-white shadow-md scale-105' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}
                     >
                       <span className="text-3xl mb-1">{k.label}</span>
                       <span className="text-xl font-bold opacity-90 whitespace-nowrap">{k.desc}</span>
                     </button>
                   ))}
                 </div>
               </div>
            </div>

            <div className="bg-white rounded-2xl shadow-lg border border-slate-100 p-4 md:p-6 min-h-[400px]">
              <div className="flex flex-wrap items-center justify-between gap-4 mb-4 border-b border-slate-100 pb-2">
                <h2 className="font-bold text-base text-slate-700">二胡指板 (Fingerboard) <span className="text-indigo-600 ml-2">- {displayKeyLabel} 調</span></h2>
              </div>
              <div className="w-full flex justify-center overflow-hidden">
                <div className="relative origin-top transform scale-[0.7] sm:scale-[0.85] md:scale-100 transition-transform">
                   <ErhuBoard 
                     activeNote={activeNote}
                     isNoteInScale={isNoteInScale}
                     getJianpuInfo={getJianpuInfo}
                     startTone={startTone}
                     stopTone={stopTone}
                   />
                </div>
              </div>
            </div>

            <div className="mt-8 text-center text-slate-400 text-sm">
              點擊音位發聲 (長按持續發聲) • 放手即停止 • 全音間有垂直虛線相連
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<MusicTool />);
  </script>
</body>
</html>
