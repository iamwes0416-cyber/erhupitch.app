<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WH二胡音準養成工具</title>
  <meta name="theme-color" content="#0b2c5f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="WH二胡音準">
  <link rel="icon" type="image/png" href="./whats二胡logo-方.png">
  <link rel="apple-touch-icon" href="./whats二胡logo-方.png">
  <link rel="manifest" href="./site.webmanifest">

  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { overscroll-behavior-y: none; }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    .tool-heading-text {
      color: rgb(30 41 59);
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.5rem;
      white-space: nowrap;
    }
    .jianpu-dot-row {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      left: 50%;
      position: absolute;
      transform: translateX(-50%);
      z-index: 2;
    }
    .jianpu-dot-row.upper.single { top: calc(8px * var(--note-scale, 1)); }
    .jianpu-dot-row.upper.double { top: calc(1px * var(--note-scale, 1)); }
    .jianpu-dot-row.lower {
      top: calc(31px * var(--note-scale, 1));
    }
    .jianpu-dot-row.lower span {
      height: calc(3px * var(--note-scale, 1));
      width: calc(3px * var(--note-scale, 1));
    }
    .jianpu-dot-row span {
      background: currentColor;
      border-radius: 9999px;
      display: block;
      height: calc(4px * var(--note-scale, 1));
      width: calc(4px * var(--note-scale, 1));
    }
    .jianpu-number {
      position: relative;
      z-index: 1;
    }
    .note-name {
      bottom: 0;
      left: 50%;
      line-height: 1;
      position: absolute;
      transform: translateX(-50%);
      white-space: nowrap;
    }
    @media (min-width: 640px) {
      .tool-heading-text { font-size: 1.125rem; line-height: 1.75rem; }
    }
    @media (min-width: 768px) {
      .tool-heading-text { font-size: 1.25rem; line-height: 1.75rem; }
    }
    @media (max-width: 640px) {
      body { overflow-y: auto; }
      .mobile-footer { display: none; }
      .mobile-app-shell { padding: 8px; }
      .mobile-tool-row { margin-bottom: 8px; padding: 10px 12px; }
      .mobile-board-card { min-height: 0; padding: 8px; }
      .mobile-board-heading { margin-bottom: 4px; padding-bottom: 4px; }
    }
  </style>
</head>
<body class="bg-slate-50">
  <div id="root"></div>

  <script>
    const plainScripts = [
      './src/app-data.js',
      './src/audio.js',
      './src/recorder.js'
    ];

    const jsxScripts = [
      './src/components.js',
      './src/main.js'
    ];

    const isLocalhost = ['localhost', '127.0.0.1'].includes(window.location.hostname);
    const scriptCacheMode = isLocalhost ? 'no-store' : 'default';

    async function loadPlainScript(src) {
      const response = await fetch(src, { cache: scriptCacheMode });
      if (!response.ok) {
        throw new Error(`Failed to fetch script: ${src}`);
      }

      const source = await response.text();
      const script = document.createElement('script');
      script.text = `(() => {\n${source}\n})();\n//# sourceURL=${src}`;
      document.body.appendChild(script);
    }

    async function loadJsxScript(src) {
      const response = await fetch(src, { cache: scriptCacheMode });
      if (!response.ok) {
        throw new Error(`Failed to fetch JSX script: ${src}`);
      }

      const source = await response.text();
      const transformed = Babel.transform(source, {
        presets: [['react', { runtime: 'classic' }]]
      }).code;
      const script = document.createElement('script');
      script.text = `(() => {\n${transformed}\n})();\n//# sourceURL=${src}`;
      document.body.appendChild(script);
    }

    async function bootstrapApp() {
      for (const src of plainScripts) {
        await loadPlainScript(src);
      }

      for (const src of jsxScripts) {
        await loadJsxScript(src);
      }
    }

    bootstrapApp().catch((error) => {
      console.error('App bootstrap failed:', error);
    });
  </script>
</body>
</html>
